[package]
name = "phenotype-observably-macros"
version = "0.1.0"
edition = "2021"
description = "Procedural macros for PhenoObservability instrumentation patterns"

[lib]
proc-macro = true

[dependencies]
quote = "1"
syn = { version = "2", features = ["full"] }
proc-macro2 = "1"

[dev-dependencies]
tracing = "0.1"
