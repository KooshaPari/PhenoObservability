version: 2
updates:
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    groups:
      cargo:
        patterns: ["*"]
    open-pull-requests-limit: 10
  - package-ecosystem: "pip"
    directory: "/ai-prompt-logger"
    schedule:
      interval: "weekly"
      day: "thursday"
    groups:
      pip:
        patterns: ["*"]
    open-pull-requests-limit: 5
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "friday"
    groups:
      github-actions:
        patterns: ["*"]
    open-pull-requests-limit: 5
