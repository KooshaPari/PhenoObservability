# Generated CI workflow - calls reusable phenotype workflow
name: CI
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true


on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]


permissions:
  contents: read
jobs:
  ci:
    uses: KooshaPari/phenotype-infrakit/.github/workflows/ci.yaml@0000000000000000000000000000000000000000 # placeholder SHA; source 404s; replace when reachable
    secrets: inherit
