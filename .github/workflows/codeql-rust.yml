name: CodeQL (Rust)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '17 4 * * 2'
  workflow_dispatch:

jobs:
  analyze:
    name: Analyze (rust)
    runs-on: ubuntu-24.04
    timeout-minutes: 360
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: Initialize CodeQL
        uses: github/codeql-action/init@0daab03d71ff584ef619d027a3fd9146679c5d84
        with:
          languages: rust
      - name: Autobuild
        uses: github/codeql-action/autobuild@0daab03d71ff584ef619d027a3fd9146679c5d84
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@0daab03d71ff584ef619d027a3fd9146679c5d84
        with:
          category: "/language:rust"
