name: Cargo Semver Checks

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  semver-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@a26af69be951a213d495a4c3e4e4022e16d87065

      - uses: obi1kenobi/cargo-semver-checks-action@v2
        with:
          manifest-path: Cargo.toml
