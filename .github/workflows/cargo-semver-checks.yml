name: Cargo Semver Checks

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  semver-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd

      - uses: obi1kenobi/cargo-semver-checks-action@v2
        with:
          manifest-path: Cargo.toml
