name: Cargo Semver Checks

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  semver-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4@11bd71901bbe5b1630ceea73d27597364c9af683

      - uses: obi1kenobi/cargo-semver-checks-action@v2
        with:
          manifest-path: Cargo.toml
