name: cargo-deny

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  deny:
    name: Supply-chain policy
    runs-on: ubuntu-latest
    env:
      PHENOTYPE_REPO_READ_TOKEN: ${{ secrets.PHENOTYPE_REPO_READ_TOKEN }}
    steps:
      - name: Check private dependency token
        run: |
          if [ -z "${PHENOTYPE_REPO_READ_TOKEN}" ]; then
            echo "::error title=Missing PHENOTYPE_REPO_READ_TOKEN::cargo-deny needs read-only access to KooshaPari/phenotype-bus, which is a private sibling dependency."
            echo "Create a fine-grained PAT or GitHub App token with read-only contents access to KooshaPari/phenotype-bus and save it as the repository secret PHENOTYPE_REPO_READ_TOKEN."
            exit 1
          fi

      - name: Checkout PhenoObservability
        uses: actions/checkout@v4
        with:
          path: PhenoObservability
          persist-credentials: false

      - name: Checkout pheno shared errors
        uses: actions/checkout@v4
        with:
          repository: KooshaPari/pheno
          path: pheno
          persist-credentials: false

      - name: Checkout private phenotype-bus dependency
        uses: actions/checkout@v4
        with:
          repository: KooshaPari/phenotype-bus
          path: phenotype-bus
          token: ${{ env.PHENOTYPE_REPO_READ_TOKEN }}
          persist-credentials: false

      - name: Run cargo-deny
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check
          manifest-path: PhenoObservability/Cargo.toml
