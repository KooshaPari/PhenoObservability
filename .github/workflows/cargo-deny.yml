name: cargo-deny
on:
  push:
    branches: [main]
  pull_request:
permissions:
  contents: read
jobs:
  deny:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          path: PhenoObservability
      - uses: actions/checkout@v5
        with:
          repository: KooshaPari/pheno
          path: pheno
      - uses: actions/checkout@v5
        with:
          repository: KooshaPari/phenotype-bus
          path: phenotype-bus
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check
          manifest-path: PhenoObservability/Cargo.toml
