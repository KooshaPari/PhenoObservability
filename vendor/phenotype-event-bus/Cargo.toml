[package]
name = "phenotype-event-bus"
version = "0.2.0"
edition = "2021"
license = "MIT OR Apache-2.0"
description = "Event bus abstractions for the Phenotype ecosystem (vendored pending phenoShared Wave E)"

[lib]
path = "src/lib.rs"

[dependencies]
thiserror = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
async-trait = "0.1"
tokio = { version = "1", features = ["full"] }
ulid = { version = "1", features = ["serde"] }
dashmap = "6.1"
phenotype-error-core = { git = "https://github.com/KooshaPari/phenotype-types", branch = "main" }

[dev-dependencies]
tokio = { version = "1", features = ["full"] }
